<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дурак онлайн</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d5c2e 0%, #1a7a3f 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 5px;
        }

        #status {
            font-size: 1.1em;
            color: #ffd700;
        }

        #trump {
            font-size: 0.95em;
            color: #b0e0e6;
        }

        .menu-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .menu-container h2 {
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .input-group {
            margin: 15px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 10px;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin: 10px 0;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .game-area {
            display: none;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-area.active {
            display: flex;
        }

        .table-area {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 3px dashed rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 15px;
            min-height: 200px;
            overflow-y: auto;
        }

        .card-pair {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .card {
            width: 70px;
            height: 100px;
            background: white;
            border-radius: 8px;
            padding: 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            user-select: none;
            position: relative;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .card:active {
            transform: translateY(-4px);
        }

        .card.red {
            color: #e63946;
        }

        .card.black {
            color: #1a1a1a;
        }

        .card-rank {
            font-size: 18px;
        }

        .card-suit {
            font-size: 20px;
        }

        .card-corner {
            position: absolute;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        .card-corner.top-left {
            top: 2px;
            left: 2px;
        }

        .card-corner.bottom-right {
            bottom: 2px;
            right: 2px;
            transform: rotate(180deg);
        }

        .hand-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 120px;
            align-content: center;
        }

        .hand-area .card {
            width: 60px;
            height: 90px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .controls button {
            flex: 1;
            min-width: 150px;
            max-width: 200px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95em;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .deck-count {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .trump-display {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .animation-card {
            animation: cardFly 0.6s ease-out;
        }

        @keyframes cardFly {
            from {
                opacity: 0;
                transform: scale(0.5) translateY(-50px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .message {
            text-align: center;
            padding: 20px;
            font-size: 1.3em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .winner-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            font-size: 2em;
            z-index: 1000;
            animation: popUp 0.5s ease-out;
        }

        @keyframes popUp {
            from {
                transform: translate(-50%, -50%) scale(0);
            }
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .card {
                width: 55px;
                height: 85px;
            }

            .hand-area .card {
                width: 50px;
                height: 75px;
            }

            .controls button {
                min-width: 120px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎰 Дурак Онлайн</h1>
    <p id="status" style="font-size: 0.9em; margin-top: 5px;"></p>
</div>

<div id="menu" class="menu-container">
    <h2>Начало игры</h2>
    <button onclick="host()">🔴 Создать комнату</button>
    <div class="input-group">
        <input id="room" type="text" placeholder="Введите код комнаты">
        <button onclick="join()">🟢 Присоединиться</button>
    </div>
</div>

<div class="game-area" id="gameArea">
    <div class="info-bar">
        <div class="trump-display">
            Козырь: <span id="trumpSuit">♠</span>
        </div>
        <div class="deck-count" id="deckInfo">
            Карт в колоде: 0
        </div>
    </div>

    <div id="message" class="message"></div>

    <div class="table-area" id="table"></div>

    <div>
        <h3 style="text-align: center; margin-bottom: 10px;">Твои карты</h3>
        <div class="hand-area" id="hand"></div>
    </div>

    <div class="controls">
        <button onclick="take()">📥 Взять карты</button>
        <button onclick="done()" class="secondary">✅ Готово / Конец хода</button>
    </div>
</div>

<div id="winner" class="winner-message" style="display: none;"></div>

<script>
    let peer, conn, me, game;

    const suits = ["♠", "♥", "♦", "♣"];
    const vals = ["6", "7", "8", "9", "10", "В", "Д", "К", "Т"];
    const rank = Object.fromEntries(vals.map((v, i) => [v, i]));

    function cardHTML(c, i) {
        let isRed = c.s === "♥" || c.s === "♦";
        let className = isRed ? "red" : "black";
        return `
            <div class="card ${className}" onclick="play(${i})" title="${c.v}${c.s}">
                <div class="card-corner top-left">
                    <div class="card-rank">${c.v}</div>
                    <div class="card-suit">${c.s}</div>
                </div>
                <div style="font-size: 2em;">${c.s}</div>
                <div class="card-corner bottom-right">
                    <div class="card-rank">${c.v}</div>
                    <div class="card-suit">${c.s}</div>
                </div>
            </div>
        `;
    }

    function host() {
        me = 0;
        peer = new Peer();
        peer.on("open", id => {
            document.getElementById("status").innerText = `Код комнаты: ${id} (скопировано)`;
            navigator.clipboard.writeText(id);
            startGame();
        });
        peer.on("connection", c => {
            conn = c;
            conn.on("open", () => {
                newGame();
                send();
            });
            conn.on("data", data => {
                if (data.type === "play") playerMove(1, data.index);
                if (data.type === "take") playerTake(1);
                if (data.type === "done") endTurn();
            });
        });
    }

    function join() {
        const roomCode = document.getElementById("room").value.trim();
        if (!roomCode) {
            alert("Введите код комнаты!");
            return;
        }

        me = 1;
        peer = new Peer();
        peer.on("open", () => {
            conn = peer.connect(roomCode);
            conn.on("data", data => {
                if (data.type === "state") {
                    game = data.game;
                    render();
                }
            });
            conn.on("open", () => {
                document.getElementById("status").innerText = "✅ Подключено!";
                startGame();
            });
            conn.on("error", err => {
                alert("Ошибка подключения: " + err.message);
            });
        });
    }

    function startGame() {
        document.getElementById("menu").style.display = "none";
        document.getElementById("gameArea").classList.add("active");
    }

    function newGame() {
        let deck = [];
        for (let s of suits) {
            for (let v of vals) {
                deck.push({ s, v });
            }
        }
        deck.sort(() => Math.random() - 0.5);

        let trump = deck[deck.length - 1].s;

        game = {
            deck,
            trump,
            hands: [deck.splice(0, 6), deck.splice(0, 6)],
            table: [],
            turn: 0,
            defender: 1,
            phase: "attack",
            winner: null
        };

        render();
    }

    function beats(a, b) {
        if (a.s === b.s && rank[a.v] > rank[b.v]) return true;
        if (a.s === game.trump && b.s !== game.trump) return true;
        return false;
    }

    function playerMove(p, i) {
        if (game.winner !== null) return;
        if (p !== game.turn && p !== game.defender) return;

        let card = game.hands[p][i];

        if (game.phase === "attack" && p === game.turn) {
            game.hands[p].splice(i, 1);
            game.table.push({ attack: card, defense: null });
            game.phase = "defense";
        } else if (game.phase === "defense" && p === game.defender) {
            let pair = game.table.find(x => !x.defense);
            if (pair && beats(card, pair.attack)) {
                game.hands[p].splice(i, 1);
                pair.defense = card;
                game.phase = "attack";
            } else {
                alert("❌ Эта карта не бьёт!");
                return;
            }
        }

        checkWin();
        send();
        render();
    }

    function play(i) {
        if (me === 0) playerMove(0, i);
        else conn.send({ type: "play", index: i });
    }

    function playerTake(p) {
        if (p !== game.defender) return;

        game.table.forEach(x => {
            game.hands[p].push(x.attack);
            if (x.defense) game.hands[p].push(x.defense);
        });

        game.table = [];
        drawCards();
        game.turn = 1 - game.turn;
        game.defender = 1 - game.turn;
        game.phase = "attack";

        send();
        render();
    }

    function take() {
        if (me === 0) playerTake(0);
        else conn.send({ type: "take" });
    }

    function done() {
        if (game.table.some(x => !x.defense)) {
            alert("⚠️ Не все карты отбиты!");
            return;
        }

        if (me === 0) endTurn();
        else conn.send({ type: "done" });
    }

    function endTurn() {
        game.table = [];
        drawCards();

        game.turn = game.defender;
        game.defender = 1 - game.turn;
        game.phase = "attack";

        checkWin();
        send();
        render();
    }

    function drawCards() {
        for (let p of [game.turn, game.defender]) {
            while (game.hands[p].length < 6 && game.deck.length) {
                game.hands[p].push(game.deck.shift());
            }
        }
    }

    function checkWin() {
        for (let p = 0; p < 2; p++) {
            if (game.hands[p].length === 0 && game.deck.length === 0) {
                game.winner = p;
            }
        }
    }

    function send() {
        if (conn && conn.open) conn.send({ type: "state", game });
    }

    function render() {
        if (!game) return;

        // Обновляем статус
        if (game.winner !== null) {
            const winnerMsg = document.getElementById("winner");
            const message = game.winner === me ? "🎉 ТЫ ПОБЕДИЛ! 🎉" : "😢 Ты проиграл!";
            winnerMsg.innerHTML = message;
            winnerMsg.style.display = "block";
            document.getElementById("status").innerText = message;
        } else {
            document.getElementById("winner").style.display = "none";
            let statusText = "";
            if (game.turn === me) {
                statusText = "🔴 Твой ход (атака)";
            } else if (game.defender === me) {
                statusText = "🟡 Ты отбиваешься (защита)";
            } else {
                statusText = "🔵 Ход противника";
            }
            document.getElementById("status").innerText = statusText;
        }

        // Сообщение о фазе
        let phaseMsg = "";
        if (game.phase === "attack") {
            phaseMsg = me === game.turn ? "Выложите карту" : "Ожидание карты";
        } else if (game.phase === "defense") {
            phaseMsg = me === game.defender ? "Отбейте карту" : "Ожидание защиты";
        }
        document.getElementById("message").innerText = phaseMsg;

        // Козырь и колода
        document.getElementById("trumpSuit").innerText = game.trump;
        document.getElementById("deckInfo").innerHTML = `🃏 Карт в колоде: <strong>${game.deck.length}</strong>`;

        // Рука
        document.getElementById("hand").innerHTML =
            game.hands[me].map(cardHTML).join("") || "<p style='color: #b0e0e6;'>Карт нет</p>";

        // Стол
        document.getElementById("table").innerHTML =
            game.table.length === 0
                ? "<p style='color: #b0e0e6; margin: auto;'>Стол пуст</p>"
                : game.table.map(x => {
                    let d = x.defense ? cardHTML(x.defense, -1) : "<div style='opacity: 0.5; padding: 20px;'>?</div>";
                    return `
                        <div class="card-pair">
                            ${cardHTML(x.attack, -1)}
                            <span style="font-size: 1.5em; color: #b0e0e6;">→</span>
                            ${d}
                        </div>
                    `;
                }).join("");
    }

    render();
</script>

</body>
</html>
