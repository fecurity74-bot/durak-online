<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры Онлайн</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a2e1f 0%, #1a5a3f 100%);
            color: white;
            min-height: 100vh;
        }

        .menu-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .menu-box {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #4caf50;
            border-radius: 20px;
            padding: 60px 80px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .menu-box h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.8);
            color: #4caf50;
        }

        .menu-box p {
            color: #aaa;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            padding: 16px 32px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-btn.primary {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
        }

        .menu-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }

        .room-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #4caf50;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 15px;
            margin: 15px 0;
            transition: all 0.3s;
        }

        .room-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .room-input:focus {
            outline: none;
            border-color: #66bb6a;
            background: rgba(76, 175, 80, 0.1);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
        }

        .game-type-select {
            margin: 30px 0;
            padding: 20px 0;
            border-top: 1px solid rgba(76, 175, 80, 0.3);
            border-bottom: 1px solid rgba(76, 175, 80, 0.3);
        }

        .game-type-select p {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 15px;
        }

        .game-options {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .game-option {
            padding: 12px 24px;
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid rgba(76, 175, 80, 0.5);
            border-radius: 8px;
            color: #4caf50;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .game-option:hover {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4caf50;
        }

        .game-option.active {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .game-screen {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        .game-screen.active {
            display: flex;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .info-label {
            font-size: 0.85em;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #4caf50;
        }

        .status-display {
            text-align: center;
            font-size: 1.1em;
            color: #ffeb3b;
            font-weight: 600;
            flex: 1;
            min-width: 200px;
        }

        .game-area {
            flex: 1;
            display: flex;
            gap: 15px;
            overflow: hidden;
        }

        .opponent-section {
            width: 180px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(76, 175, 80, 0.2);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-title {
            font-size: 0.9em;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(76, 175, 80, 0.2);
        }

        .opponent-cards {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-content: flex-start;
            overflow-y: auto;
        }

        .card-back {
            width: 45px;
            height: 65px;
            background: linear-gradient(135deg, #1a3a5c, #2a5a8c);
            border: 2px solid #4caf50;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
        }

        .table-section {
            flex: 1;
            background: rgba(20, 80, 30, 0.3);
            border: 2px solid rgba(76, 175, 80, 0.5);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .table-content {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-content: flex-start;
            overflow-y: auto;
            padding: 5px;
        }

        .table-empty {
            color: #888;
            font-size: 1.2em;
            margin: auto;
        }

        .card-pair {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .card-pair.beaten {
            border-color: rgba(76, 175, 80, 0.6);
            background: rgba(76, 175, 80, 0.15);
        }

        .card-pair.unbeaten {
            border-color: rgba(255, 152, 0, 0.6);
            background: rgba(255, 152, 0, 0.1);
        }

        .card-pair-arrow {
            color: #bbb;
            font-weight: bold;
            font-size: 1.2em;
        }

        .card {
            width: 50px;
            height: 70px;
            background: white;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4px;
            font-weight: bold;
            font-size: 0.8em;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            cursor: default;
            transition: all 0.2s;
        }

        .card.red { color: #e63946; }
        .card.black { color: #000; }

        .card-suit { font-size: 1.4em; }
        .card-rank { font-size: 0.7em; }

        .hand-section {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(76, 175, 80, 0.3);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hand-content {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 90px;
            align-items: center;
        }

        .hand-content .card {
            width: 55px;
            height: 75px;
            cursor: pointer;
        }

        .hand-content .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
        }

        .hand-content .card.selected {
            border: 3px solid #ffeb3b;
            background: rgba(255, 235, 59, 0.1);
            box-shadow: 0 8px 16px rgba(255, 235, 59, 0.4);
        }

        .hand-empty {
            color: #888;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(76, 175, 80, 0.3);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.2);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .message-box {
            background: rgba(76, 175, 80, 0.15);
            border-left: 4px solid #4caf50;
            padding: 12px 16px;
            border-radius: 6px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95em;
            text-align: center;
            color: #b8e6b8;
        }

        .message-box.error {
            background: rgba(244, 67, 54, 0.15);
            border-left-color: #f44336;
            color: #ffb8b8;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #4caf50;
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            animation: slideUp 0.4s ease-out;
        }

        .modal-content h2 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #4caf50;
        }

        .modal-content p {
            font-size: 1.1em;
            color: #aaa;
            margin-bottom: 30px;
        }

        .modal-content .btn {
            width: 200px;
            margin: 0 auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .game-area { flex-direction: column; }
            .opponent-section { width: 100%; max-height: 120px; }
            .card { width: 45px; height: 65px; }
            .hand-content .card { width: 50px; height: 70px; }
        }

        @media (max-width: 768px) {
            .menu-box { padding: 40px; }
            .modal-content { padding: 40px 50px; }
            .modal-content h2 { font-size: 2em; }
        }
    </style>
</head>
<body>

<div id="menuScreen" class="menu-screen">
    <div class="menu-box">
        <h1>🎮</h1>
        <h1 style="color: white; font-size: 2.5em; margin-bottom: 10px;">ИГРЫ</h1>
        <p>Карточные игры для двоих</p>

        <div class="game-type-select">
            <p>Выберите игру:</p>
            <div class="game-options">
                <button class="game-option active" onclick="selectGame('durak')">🃏 Дурак</button>
                <button class="game-option" onclick="selectGame('chess')">♟️ Шахматы</button>
            </div>
        </div>

        <div class="menu-buttons">
            <button class="menu-btn primary" onclick="createGame()">🔴 Создать игру</button>
            <input id="roomInput" class="room-input" type="text" placeholder="Введите код игры">
            <button class="menu-btn primary" onclick="joinGame()">🟢 Присоединиться</button>
        </div>
    </div>
</div>

<div id="gameScreen" class="game-screen">
    <div class="top-bar">
        <div class="info-item">
            <div class="info-label">Козырь</div>
            <div class="info-value" id="trump">♠</div>
        </div>
        <div class="status-display" id="status">Загрузка...</div>
        <div class="info-item">
            <div class="info-label">Колода</div>
            <div class="info-value" id="deckCount">0</div>
        </div>
    </div>

    <div class="game-area">
        <div class="opponent-section">
            <div class="section-title">👤 Противник</div>
            <div class="opponent-cards" id="opponentCards"></div>
        </div>

        <div class="table-section">
            <div class="section-title">🃏 Стол</div>
            <div class="table-content" id="tableCards"></div>
        </div>
    </div>

    <div class="hand-section">
        <div class="section-title">Твои карты (Кликни чтобы выбрать)</div>
        <div class="hand-content" id="hand"></div>
    </div>

    <div class="message-box" id="message"></div>

    <div class="controls">
        <button class="btn btn-primary" id="attackBtn" onclick="playSelectedCard('attack')">🎯 Подкинуть выбранную</button>
        <button class="btn btn-secondary" id="defendBtn" onclick="playSelectedCard('defend')">✅ Отбить выбранной</button>
        <button class="btn btn-secondary" id="endBtn" onclick="endTurn()">✋ Завершить ход</button>
        <button class="btn btn-secondary" id="giveupBtn" onclick="giveUp()">📥 Сдаться</button>
    </div>
</div>

<div id="winnerModal" class="modal">
    <div class="modal-content">
        <h2 id="winnerTitle">Победа!</h2>
        <p id="winnerMsg"></p>
        <button class="btn btn-primary" onclick="location.reload()">Играть снова</button>
    </div>
</div>

<script>
    let peer, conn, me, game, gameType = 'durak', selectedCardIdx = null;

    const SUITS = ["♠", "♥", "♦", "♣"];
    const RANKS = ["6", "7", "8", "9", "10", "В", "Д", "К", "Т"];
    const RANK_VALUE = Object.fromEntries(RANKS.map((r, i) => [r, i]));

    function selectGame(type) {
        gameType = type;
        document.querySelectorAll('.game-option').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function createGame() {
        me = 0;
        peer = new Peer();
        peer.on("open", id => {
            navigator.clipboard.writeText(id);
            startGameUI();
            addMessage("Код скопирован в буфер: " + id);
        });
        peer.on("connection", conn => {
            onConnection(conn);
        });
    }

    function joinGame() {
        const code = document.getElementById("roomInput").value.trim();
        if (!code) {
            addMessage("Введите код игры!", true);
            return;
        }

        me = 1;
        peer = new Peer();
        peer.on("open", () => {
            conn = peer.connect(code);
            conn.on("open", () => {
                startGameUI();
                addMessage("Подключено к игре");
            });
            conn.on("data", handleMessage);
            conn.on("error", err => addMessage("Ошибка: " + err.message, true));
        });
    }

    function onConnection(c) {
        conn = c;
        conn.on("open", () => {
            startGameUI();
            initGame();
        });
        conn.on("data", handleMessage);
    }

    function startGameUI() {
        document.getElementById("menuScreen").style.display = "none";
        document.getElementById("gameScreen").classList.add("active");
    }

    function initGame() {
        if (gameType === 'durak') {
            initDurakGame();
        } else if (gameType === 'chess') {
            initChessGame();
        }
    }

    // ========== ДУРАК ==========

    function initDurakGame() {
        let deck = [];
        for (let s of SUITS) {
            for (let r of RANKS) {
                deck.push({ suit: s, rank: r });
            }
        }
        deck.sort(() => Math.random() - 0.5);

        let trump = deck[deck.length - 1].suit;

        game = {
            type: 'durak',
            deck,
            trump,
            hands: [deck.splice(0, 6), deck.splice(0, 6)],
            table: [],
            attacker: 0,
            defender: 1,
            phase: "attack",
            winner: null
        };

        render();
        send();
    }

    function initChessGame() {
        game = {
            type: 'chess',
            board: initChessBoard(),
            turn: 0,
            winner: null
        };
        render();
        send();
    }

    function initChessBoard() {
        return [
            ['♖','♘','♗','♕','♔','♗','♘','♖'],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            ['♟','♟','♟','♟','♟','♟','♟','♟'],
            ['♜','♞','♝','♛','♚','♝','♞','♜']
        ];
    }

    function handleMessage(data) {
        if (data.type === "state") {
            game = data.game;
            selectedCardIdx = null;
            render();
        }
    }

    function canBeat(attacker, defender) {
        if (attacker.suit === defender.suit && RANK_VALUE[attacker.rank] > RANK_VALUE[defender.rank]) return true;
        if (attacker.suit === game.trump && defender.suit !== game.trump) return true;
        return false;
    }

    function getValidAttackRanks() {
        let ranks = new Set();
        game.table.forEach(pair => {
            ranks.add(pair.attack.rank);
            if (pair.defense) ranks.add(pair.defense.rank);
        });
        return ranks;
    }

    function canAttackMore() {
        if (game.table.length >= 6) return false;
        if (game.table.length >= game.hands[game.defender].length) return false;
        if (game.table.length === 0) return true;

        let validRanks = getValidAttackRanks();
        return game.hands[game.attacker].some(c => validRanks.has(c.rank));
    }

    function playSelectedCard(action) {
        if (selectedCardIdx === null) {
            addMessage("Выберите карту!", true);
            return;
        }

        if (gameType === 'durak') {
            if (action === 'attack') {
                playDurakAttack();
            } else if (action === 'defend') {
                playDurakDefend();
            }
        }

        selectedCardIdx = null;
        render();
    }

    function playDurakAttack() {
        if (me !== game.attacker) {
            addMessage("Сейчас не ваш ход", true);
            return;
        }

        if (game.table.some(p => !p.defense)) {
            addMessage("Защитник не отбил карту", true);
            return;
        }

        if (!canAttackMore()) {
            addMessage("Невозможно подкинуть", true);
            return;
        }

        let card = game.hands[me][selectedCardIdx];
        if (!card) return;

        let validRanks = getValidAttackRanks();
        if (game.table.length > 0 && !validRanks.has(card.rank)) {
            addMessage("Карта не совпадает по рангу!", true);
            return;
        }

        game.table.push({ attack: card, defense: null });
        game.hands[me].splice(selectedCardIdx, 1);
        game.phase = "defense";
        addMessage("Карта выложена!");
        send();
        render();
    }

    function playDurakDefend() {
        if (me !== game.defender) {
            addMessage("Вы не защищаетесь", true);
            return;
        }

        let unbeaten = game.table.find(p => !p.defense);
        if (!unbeaten) {
            addMessage("Все карты отбиты", true);
            return;
        }

        let card = game.hands[me][selectedCardIdx];
        if (!card) return;

        if (!canBeat(card, unbeaten.attack)) {
            addMessage("Карта не бьёт!", true);
            return;
        }

        unbeaten.defense = card;
        game.hands[me].splice(selectedCardIdx, 1);
        game.phase = "attack";
        addMessage("Карта отбита!");
        send();
        render();
    }

    function endTurn() {
        if (me !== game.attacker) {
            addMessage("Не ваш ход", true);
            return;
        }

        if (game.table.some(p => !p.defense)) {
            addMessage("Защитник не отбил все карты", true);
            return;
        }

        game.table = [];
        drawCards();
        switchRoles();
        send();
        render();
    }

    function giveUp() {
        if (me !== game.defender) {
            addMessage("Вы не защищаетесь", true);
            return;
        }

        game.table.forEach(pair => {
            game.hands[me].push(pair.attack);
            if (pair.defense) game.hands[me].push(pair.defense);
        });

        game.table = [];
        drawCards();
        switchRoles();
        addMessage("Вы сдались!");
        send();
        render();
    }

    function switchRoles() {
        game.attacker = game.defender;
        game.defender = 1 - game.attacker;
        game.phase = "attack";
        checkWin();
    }

    function drawCards() {
        for (let p of [game.attacker, game.defender]) {
            while (game.hands[p].length < 6 && game.deck.length) {
                game.hands[p].push(game.deck.shift());
            }
        }
    }

    function checkWin() {
        for (let i = 0; i < 2; i++) {
            if (game.hands[i].length === 0 && game.deck.length === 0) {
                game.winner = 1 - i;
                showWinner();
            }
        }
    }

    // ========== РЕНДЕРИНГ ==========

    function renderCard(card, clickable = false, idx = -1) {
        if (!card) return '<div class="card-back">🂠</div>';

        let isRed = card.suit === "♥" || card.suit === "♦";
        let cls = isRed ? "red" : "black";
        let selected = selectedCardIdx === idx ? "selected" : "";
        let click = clickable ? `onclick="selectCard(${idx})"` : "";

        return `<div class="card ${cls} ${selected}" ${click} style="cursor: ${clickable ? 'pointer' : 'default'};">
            <div class="card-rank">${card.rank}</div>
            <div class="card-suit">${card.suit}</div>
        </div>`;
    }

    function render() {
        if (!game) return;

        if (game.type === 'durak') {
            renderDurak();
        }
    }

    function renderDurak() {
        if (game.winner !== null) {
            showWinner();
            return;
        }

        let status = "";
        if (game.attacker === me) {
            status = `🎯 ВАШ ХОД - подкидывайте карты (выберите и нажмите кнопку)`;
        } else if (game.defender === me) {
            status = `🛡️ ЗАЩИТА - отбивайте карты (выберите и нажмите кнопку)`;
        } else {
            status = `⏳ Ход противника...`;
        }
        document.getElementById("status").innerHTML = status;

        document.getElementById("trump").innerText = game.trump;
        document.getElementById("deckCount").innerText = game.deck.length;

        document.getElementById("opponentCards").innerHTML = game.hands[1 - me]
            .map(() => renderCard(null))
            .join("");

        if (game.table.length === 0) {
            document.getElementById("tableCards").innerHTML = '<div class="table-empty">Стол пуст</div>';
        } else {
            document.getElementById("tableCards").innerHTML = game.table.map((pair, i) => {
                let beaten = pair.defense ? "beaten" : "unbeaten";
                let arrow = pair.defense ? "✓" : "→";
                return `<div class="card-pair ${beaten}">
                    ${renderCard(pair.attack)}
                    <span class="card-pair-arrow">${arrow}</span>
                    ${pair.defense ? renderCard(pair.defense) : '<div class="card-back">?</div>'}
                </div>`;
            }).join("");
        }

        if (game.hands[me].length === 0) {
            document.getElementById("hand").innerHTML = '<div class="hand-empty">Карт нет</div>';
        } else {
            document.getElementById("hand").innerHTML = game.hands[me]
                .map((card, i) => renderCard(card, true, i))
                .join("");
        }

        updateButtons();
    }

    function updateButtons() {
        const attackBtn = document.getElementById("attackBtn");
        const defendBtn = document.getElementById("defendBtn");
        const endBtn = document.getElementById("endBtn");
        const giveupBtn = document.getElementById("giveupBtn");

        attackBtn.disabled = me !== game.attacker || game.table.some(p => !p.defense) || !canAttackMore() || selectedCardIdx === null;
        defendBtn.disabled = me !== game.defender || !game.table.some(p => !p.defense) || selectedCardIdx === null;
        endBtn.disabled = me !== game.attacker || game.table.some(p => !p.defense);
        giveupBtn.disabled = me !== game.defender;
    }

    function selectCard(idx) {
        selectedCardIdx = selectedCardIdx === idx ? null : idx;
        render();
    }

    function addMessage(msg, isError = false) {
        const box = document.getElementById("message");
        box.innerHTML = msg;
        box.classList.toggle("error", isError);
    }

    function send() {
        if (conn && conn.open) {
            conn.send({ type: "state", game });
        }
    }

    function showWinner() {
        let title, msg;
        if (game.winner === me) {
            title = "🎉 ПОБЕДА!";
            msg = "Вы выиграли!";
        } else {
            title = "😢 ПОРАЖЕНИЕ";
            msg = "Противник выиграл!";
        }

        document.getElementById("winnerTitle").innerText = title;
        document.getElementById("winnerMsg").innerText = msg;
        document.getElementById("winnerModal").classList.add("active");
    }

    render();
</script>

</body>
</html>
